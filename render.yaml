services:
  - type: web
    name: shopify-shiprocket-order-tracker
    env: node
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHIPROCKET_EMAIL
        sync: false
      - key: SHIPROCKET_PASSWORD
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SHOPIFY_STOREFRONT_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_STOREFRONT_API_VERSION
        value: 2025-07
      - key: SHOPIFY_APP_NAME
        value: Shopify Store Assistant App
      - key: SHOPIFY_APP_HANDLE
        value: shopify-store-assistant-app
      - key: ALLOW_ORIGIN
        sync: false
