services:
  - type: web
    name: shopify-shiprocket-order-tracker
    env: node
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    disks:
      - name: store-settings
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORE_SETTINGS_FILE
        value: /var/data/store-settings.json
      - key: SETTINGS_ENCRYPTION_KEY
        sync: false
      - key: SHIPROCKET_EMAIL
        sync: false
      - key: SHIPROCKET_PASSWORD
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SHOPIFY_STOREFRONT_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_STOREFRONT_API_VERSION
        value: 2025-07
      - key: SHOPIFY_APP_NAME
        value: Shopify Store Assistant App
      - key: SHOPIFY_APP_HANDLE
        value: shopify-store-assistant-app
      - key: STORE_NAME
        sync: false
      - key: STORE_SUPPORT_EMAIL
        sync: false
      - key: STORE_SUPPORT_PHONE
        sync: false
      - key: STORE_SUPPORT_WHATSAPP
        sync: false
      - key: STORE_SUPPORT_HOURS
        sync: false
      - key: STORE_SHIPPING_POLICY
        sync: false
      - key: STORE_RETURN_POLICY
        sync: false
      - key: STORE_COD_POLICY
        sync: false
      - key: STORE_CANCELLATION_POLICY
        sync: false
      - key: STORE_ORDER_PROCESSING_TIME
        sync: false
      - key: STORE_CONTACT_URL
        sync: false
      - key: STORE_ABOUT_TEXT
        sync: false
      - key: ALLOW_ORIGIN
        sync: false
